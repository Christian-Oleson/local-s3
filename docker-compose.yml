services:
  local-s3:
    build: .
    ports:
      - "4566:4566"
    volumes:
      - ./data:/data
    environment:
      - RUST_LOG=local_s3=info
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4566/_health || exit 1"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
